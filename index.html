<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANJA GIFTHOUSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding-bottom: 70px; }
        .header { background: white; padding: 15px; text-align: center; font-weight: bold; color: #1e3a8a; }
        .discount-section { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; }
        .black-box-input { width: 100%; padding: 12px; background: #0f172a; color: #facc15; border: none; text-align: center; font-size: 18px; margin-top: 10px; }
        .admin-amount-box { display: none; margin-top: 15px; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #cbd5e1; border-top: 5px solid #2563eb; border-radius: 50%; }
        .lucky-progress-container { width: 100%; background: #e2e8f0; height: 25px; border-radius: 10px; margin-top: 10px; display: none; }
        .lucky-progress-bar { height: 100%; background: #facc15; width: 0%; border-radius: 10px; text-align: center; color: #000; font-weight: bold; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner" id="mainSpinner"></div></div>
    <div class="header">PANJA GIFTHOUSE</div>

    <div class="discount-section">
        <h3>🎉 লাকি কুপন ড্র (Up To 50% Off)</h3>
        <p style="font-size: 12px; color: red;">*শর্তাবলী: মিনিমাম ৪০০ টাকার কেনাকাটা আবশ্যিক।</p>
        <input type="text" id="discName" placeholder="কাস্টমারের নাম" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="text" id="discPhone" placeholder="মোবাইল নম্বর" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="submitRequest()" style="width:100%; padding:10px; background:#2563eb; color:white; border:none;">ডিসকাউন্ট রিকোয়েস্ট পাঠান</button>

        <div style="margin-top:20px;">
            <h4>🔒 Admin Verification</h4>
            <input type="text" class="black-box-input" id="adminOtp" placeholder="ENTER OTP" onkeyup="verifyOtp()">
            <div class="admin-amount-box" id="amountGate">
                <label>টোটাল কেনাকাটার অ্যামাউন্ট (₹400+):</label>
                <input type="number" id="billAmount" placeholder="অ্যামাউন্ট বসান" onkeyup="calculateDiscount()">
            </div>
        </div>
        <div id="statusText" style="margin-top:10px; font-weight:bold;"></div>
        <div class="lucky-progress-container" id="progCont">
            <div class="lucky-progress-bar" id="progBar">0%</div>
        </div>
    </div>

    <script>
        // ==========================================
        // পয়েন্ট ১: নিরাপত্তা ও লিমিট লজিক (নতুন)
        // ==========================================
        let customerHistory = JSON.parse(localStorage.getItem('custHistory')) || {};
        let editCount = 0; // সেশন প্রতি এডিট কাউন্টার
        let generatedOtp = "";

        // লোডার র্যান্ডম অ্যানিমেশন
        window.onload = () => {
            const loaders = ["spin 1s linear infinite", "spin 1.5s ease-in infinite"];
            document.getElementById("mainSpinner").style.animation = loaders[Math.floor(Math.random() * loaders.length)];
            setTimeout(() => document.getElementById("loader").style.display = "none", 1500);
        };

        // মোবাইল নম্বর লিমিট লজিক (দিনে ৩ বার)
        function submitRequest() {
            const phone = document.getElementById("discPhone").value.trim();
            const today = new Date().toISOString().split('T')[0];

            if (!customerHistory[phone]) customerHistory[phone] = { count: 0, date: today };
            if (customerHistory[phone].date !== today) { customerHistory[phone].count = 0; customerHistory[phone].date = today; }
            
            if (customerHistory[phone].count >= 3) {
                alert("এই নম্বরটি আজকের জন্য লিমিট শেষ! আগামীকাল আবার ট্রাই করুন।");
                return;
            }

            customerHistory[phone].count++;
            localStorage.setItem('custHistory', JSON.stringify(customerHistory));
            
            generatedOtp = String(Math.floor(1000 + Math.random() * 9000));
            alert("OTP জেনারেট হয়েছে: " + generatedOtp);
            editCount = 0; // নতুন OTP সেশন শুরু
        }

        function verifyOtp() {
            if(document.getElementById("adminOtp").value === generatedOtp && generatedOtp !== "") {
                document.getElementById("amountGate").style.display = "block";
            }
        }

        // ==========================================
        // পয়েন্ট ২: অ্যামাউন্ট এডিট ও ডিসকাউন্ট লজিক
        // ==========================================
        function calculateDiscount() {
            // এডিট লিমিট (২ বার)
            if(editCount >= 2) {
                alert("এই OTP-র এডিট লিমিট শেষ! নতুন OTP নিন।");
                return;
            }

            let amount = parseFloat(document.getElementById("billAmount").value);
            let status = document.getElementById("statusText");
            let progCont = document.getElementById("progCont");
            let progBar = document.getElementById("progBar");

            if(amount < 400) {
                status.innerText = "❌ ৪০০ টাকার কম অ্যামাউন্ট কাজ করবে না।";
                progCont.style.display = "none";
                return;
            }

            editCount++; 
            progCont.style.display = "block";
            
            // ডিসকাউন্ট রেঞ্জ স্ল্যাব (পরিবর্তনের জন্য এখানে আসবেন)
            let max = 5;
            if(amount >= 6000) max = 35;
            else if(amount >= 5000) max = 30;
            else if(amount >= 4000) max = 25;
            else if(amount >= 3000) max = 20;
            else if(amount >= 2000) max = 15;
            else if(amount >= 1000) max = 10;

            let finalPerc = Math.random() < 0.4 ? 0 : (Math.floor(Math.random() * (max/5)) * 5) + 5;
            
            progBar.style.width = "100%";
            progBar.innerText = finalPerc + "% OFF";
            
            // Better Luck লজিক
            status.style.color = (finalPerc === 0) ? "red" : "green";
            status.innerText = finalPerc === 0 ? "Better Luck Next Time (0%)" : "অভিনন্দন! আপনি জিতেছেন " + finalPerc + "%";
        }
    </script>
</body>
</html>
