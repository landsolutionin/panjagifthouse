<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>PANJA GIFTHOUSE - প্রিমিয়াম স্টোর</title>
    <style>
        /* [পার্ট ১: থিম কালার কনফিগারেশন - পরিবর্তনযোগ্য] */
        :root { --primary: #2563eb; --accent: #facc15; }
        body { margin: 0; font-family: sans-serif; transition: background 1s ease; }

        /* [পার্ট ২: প্রি-লোডার ও অ্যানিমেশন] */
        #loader { position: fixed; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .logo-box { font-size: 2.5rem; font-weight: bold; color: var(--primary); animation: grow 1.5s ease-out; }
        @keyframes grow { 0% { transform: scale(0.5); } 100% { transform: scale(1.2); } }

        /* [পার্ট ৩: প্রোডাক্ট কার্ড ও লেআউট] */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: white; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; }
        .img-placeholder { height: 100px; background: #ddd; margin-bottom: 10px; }

        /* [পার্ট ৪: কুপন ও প্রগ্রেস বার] */
        .coupon-sec { padding: 20px; background: white; margin: 20px; border-radius: 10px; }
        #progBar { height: 20px; background: var(--accent); width: 0%; transition: width 0.5s; }
    </style>
</head>
<body>

    <div id="loader"><div class="logo-box">PANJA GIFTHOUSE</div></div>

    <div class="grid">
        <div class="card"><div class="img-placeholder"></div>ফ্যাশন</div>
        <div class="card"><div class="img-placeholder"></div>গিফট</div>
        <div class="card"><div class="img-placeholder"></div>খেলনা</div>
    </div>

    <div class="coupon-sec">
        <h3>লগইন করুন ও ডিসকাউন্ট দেখুন</h3>
        <input type="text" id="phone" placeholder="মোবাইল নম্বর">
        <button onclick="startLogin()">লগইন</button>
        <div id="discResult" style="margin-top:10px;"></div>
        <div id="progBar"></div>
    </div>

    <script>
        // ১. প্রতি রিফ্রেশে কালার পরিবর্তন
        const colors = ['#1a1a1a', '#8b0000', '#006400'];
        document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

        // ২. লোডার লজিক
        window.onload = () => setTimeout(() => document.getElementById('loader').style.display = 'none', 1500);

        // ৩. ডিসকাউন্ট স্লাব ও এনিমেশন (আপনার বলা ১০% - ৫০% লজিক)
        function startLogin() {
            alert("হোয়াটসঅ্যাপে OTP পাঠানো হয়েছে!");
            let bar = document.getElementById('progBar');
            let width = 10; // ১০% থেকে শুরু
            let interval = setInterval(() => {
                if (width >= 50) width = 10; // ৫০% এ গিয়ে আবার ১০% এ নেমে আসবে
                width += 5;
                bar.style.width = width + "%";
                if(width >= 50) clearInterval(interval); 
            }, 300);
        }
    </script>
</body>
</html>
