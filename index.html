<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>PANJA GIFTHOUSE - প্রিমিয়াম স্টোর</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f1f5f9; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { width: 90%; padding: 10px; margin: 10px 0; }
        #discountPage, #giftBox { display: none; }
        /* গিফট বক্স এনিমেশন */
        .gift-img { width: 100px; cursor: pointer; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <!-- পার্ট ১: স্টাফ লগইন পেজ -->
    <div class="box" id="loginPage">
        <h3>স্টাফ লগইন</h3>
        <input type="text" id="staffPhone" placeholder="আপনার মোবাইল নম্বর">
        <button onclick="loginProcess()">ওটিপি পাঠান ও লগইন করুন</button>
    </div>

    <!-- পার্ট ২: ডিসকাউন্ট এন্ট্রি পেজ (লগইন সফল হলে খুলবে) -->
    <div class="box" id="discountPage">
        <h3>কাস্টমার ডিটেইলস</h3>
        <input type="text" id="custPhone" placeholder="কাস্টমারের মোবাইল নম্বর">
        <input type="number" id="shopAmount" placeholder="শপিং অ্যামাউন্ট">
        <button onclick="showGift()">ডিসকাউন্ট দেখুন</button>
    </div>

    <!-- পার্ট ৩: গিফট বক্স এনিমেশন -->
    <div class="box" id="giftBox">
        <h3>উপহারের জন্য ক্লিক করুন!</h3>
        <img src="https://cdn-icons-png.flaticon.com/512/3132/3132039.png" class="gift-img" onclick="revealDiscount()">
    </div>

    <script>
        // ১. লগইন প্রসেস
        function loginProcess() {
            alert("ওটিপি পাঠানো হয়েছে!"); // সিমুলেটেড ওটিপি
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('discountPage').style.display = 'block';
        }

        // ২. কাস্টমার ডাটা এন্ট্রি
        function showGift() {
            document.getElementById('discountPage').style.display = 'none';
            document.getElementById('giftBox').style.display = 'block';
        }

        // ৩. গিফট বক্স ক্লিক করলে ডিসকাউন্ট শো করা
        function revealDiscount() {
            let amount = document.getElementById('shopAmount').value;
            let discount = (amount > 1000) ? "২০%" : "১০%"; // আপনার ডিসকাউন্ট লজিক
            alert("অভিনন্দন! আপনি জিতেছেন: " + discount + " ডিসকাউন্ট!");
            // এখানে আপনি এই ডাটাটি লোকাল ডেটাবেসে বা কনসোলে সেভ করে রাখতে পারেন
            console.log("কাস্টমার ডাটা রেকর্ড হয়েছে");
        }
    </script>
</body>
</html>
